name: Update Tesla Careers Data

on:
  schedule:
    # Run daily at 8am UTC (3am EST)
    - cron: "0 8 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Scrape Tesla careers
        run: node .github/scripts/scrape-careers.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/careers.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/careers.ts
          git commit -m "chore: update careers data from tesla.com/careers"
          git push
